# CronJob — transient. Schedule drives runs/month; pricing also needs the
# `runtime_hours_per_run` usage input (see ../../infracost-usage.yml), otherwise
# it shows as usage-dependent. The schedule is set per-environment in the overlays.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  labels:
    app: db-backup
    Service: db-backup
spec:
  schedule: "0 0 * * *" # daily by default; prod runs hourly
  jobTemplate:
    spec:
      completions: 1
      parallelism: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: example/pg-backup:latest
              resources:
                requests:
                  cpu: "250m"
                  memory: 512Mi