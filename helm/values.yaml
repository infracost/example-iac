# Default values for the shop chart — the chart-wide baseline. Every workload's
# cost comes from the numbers here; values-dev.yaml and values-prod.yaml override
# them per environment. Rightsize in these files, not in templates/.

# The Environment label (a tag) stamped on every workload, used for
# tagging-policy checks. Overridden per environment.
environment: base

# api — an always-on Deployment fronted by a load balancer.
# Cost = (sum of container CPU/memory requests) × replicas × 730h, plus the load
# balancer.
api:
  replicas: 2 # <<<<<<<<<< Try changing this to 4 to compare the costs
  resources:
    requests:
      cpu: "500m" # <<<<<<<<<< Try changing this to "1" to compare the costs
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  service:
    # LoadBalancer is billed as a cloud load balancer; ClusterIP (dev) is free.
    type: LoadBalancer

# database — an always-on StatefulSet with one persistent volume per replica.
database:
  replicas: 2 # <<<<<<<<<< Try changing this to 1 to compare the costs
  resources:
    requests:
      cpu: "250m"
      memory: 512Mi
    limits:
      cpu: "500m"
      memory: 1Gi
  storage:
    class: gp3 # <<<<<<<<<< Try changing this to io2 to compare the costs
    size: 50Gi
  # A separate backups volume plus an hourly backup CronJob.
  backups:
    enabled: true
    size: 50Gi
    schedule: "0 * * * *" # <<<<<<<<<< hourly -> 730 runs/month; try "0 0 * * *" (daily) to compare the costs

# logging — a DaemonSet (one pod per node). Cost = requests × node count × 730h.
# Node count comes from the `nodes` usage input (see infracost-usage.yml).
logging:
  resources:
    requests:
      cpu: "100m"
      memory: 256Mi

# cache — values for the vendored cache subchart (charts/cache), passed through
# under its chart name.
cache:
  replicas: 1 # <<<<<<<<<< Try changing this to 3 to compare the costs
  resources:
    requests:
      cpu: "100m"
      memory: 128Mi