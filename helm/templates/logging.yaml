# DaemonSet — one pod per node. Priced as (container requests) × node count ×
# 730h. Node count defaults to 1; set the `nodes` usage input (see
# infracost-usage.yml) to scale it. Container sizing comes from values.yaml.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-agent
  namespace: kube-system
  labels:
    app: node-agent
    Service: node-agent
    Environment: {{ .Values.environment }}
spec:
  selector:
    matchLabels:
      app: node-agent
  template:
    metadata:
      labels:
        app: node-agent
    spec:
      containers:
        - name: agent
          image: example/node-agent:latest
          resources:
            {{- toYaml .Values.logging.resources | nindent 12 }}